<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>文件中转台</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main id="loginView" class="login-shell">
      <section class="login-panel">
        <div class="login-brand">
          <span class="brand-mark">L</span>
          <div>
            <p class="eyebrow">Local Transfer</p>
            <h1>文件中转台</h1>
          </div>
        </div>
        <form id="loginForm" class="login-form">
          <label>
            <span>用户名</span>
            <input id="loginUser" name="username" autocomplete="username" placeholder="输入用户名">
          </label>
          <label>
            <span>密码</span>
            <input id="loginPass" name="password" type="password" autocomplete="current-password">
          </label>
          <button type="submit">进入面板</button>
          <p id="loginError" class="form-error" hidden></p>
        </form>
      </section>
    </main>

    <main id="appView" class="app-shell" hidden>
      <header class="topbar">
        <div class="app-title">
          <span class="brand-mark small">L</span>
          <div>
            <p class="eyebrow">Local Transfer</p>
            <h1>文件中转台</h1>
          </div>
        </div>
        <div class="topbar-actions">
          <span id="statusBadge" class="badge">连接中</span>
          <button id="refreshAllBtn" class="ghost-button" type="button">刷新全部</button>
          <button id="logoutBtn" class="ghost-button" type="button">退出</button>
        </div>
      </header>

      <section class="workspace">
        <aside class="sidebar">
          <section class="panel">
            <div class="panel-title">
              <h2>存储位置</h2>
              <button id="reloadRemotesBtn" class="icon-button" type="button" title="刷新位置">↻</button>
            </div>
            <nav id="remoteList" class="remote-list"></nav>
          </section>

          <section class="panel side-pages">
            <div class="side-tabs" role="tablist" aria-label="侧栏分页">
              <button class="side-tab active" type="button" data-side-page="downloads">下载</button>
              <button class="side-tab" type="button" data-side-page="send">发送</button>
              <button class="side-tab" type="button" data-side-page="overview">概览</button>
            </div>

            <div class="side-page active" data-side-content="downloads">
              <div class="panel-title">
                <h2>新建下载</h2>
              </div>
              <form id="downloadForm" class="download-form">
                <textarea id="downloadUrl" rows="4" placeholder="粘贴 http、https、ftp 或 magnet 链接"></textarea>
                <button type="submit">加入队列</button>
              </form>
            </div>

            <div class="side-page" data-side-content="send" hidden>
              <div class="panel-title">
                <h2>发送规则</h2>
              </div>
              <form id="sendSettingsForm" class="send-settings">
                <label>
                  <span>大文件阈值</span>
                  <input id="sendThresholdGb" type="number" min="0.01" step="0.01" value="1">
                </label>
                <label>
                  <span>本机访问地址</span>
                  <input id="sendPublicHost" value="10.42.0.1">
                </label>
                <label>
                  <span>远端接收地址</span>
                  <input id="peerReceiverUrl" placeholder="http://10.42.0.2:6800/...">
                </label>
                <label>
                  <span>访问口令</span>
                  <input id="peerReceiverToken" type="password" placeholder="接收端口令">
                </label>
                <label>
                  <span>远端保存目录</span>
                  <input id="peerDir" placeholder="/path/to/downloads">
                </label>
                <label>
                  <span>小文件处理</span>
                  <select id="smallMethod">
                    <option value="none">手动确认</option>
                    <option value="copy">直连复制</option>
                    <option value="sync">同步发送</option>
                  </select>
                </label>
                <label>
                  <span>复制目标</span>
                  <input id="copyTarget" placeholder="peer:/target/dir">
                </label>
                <label>
                  <span>同步目标</span>
                  <input id="syncTarget" placeholder="user@10.42.0.2:/target/dir/">
                </label>
                <button type="submit" class="secondary-button">保存策略</button>
              </form>
            </div>

            <div class="side-page" data-side-content="overview" hidden>
              <div class="panel-title">
                <h2>传输概览</h2>
              </div>
              <dl class="metrics">
                <div><dt>文件传输</dt><dd id="transferSpeed">0 B/s</dd></div>
                <div><dt>下载速度</dt><dd id="downloadSpeed">0 B/s</dd></div>
                <div><dt>队列任务</dt><dd id="activeCount">0</dd></div>
              </dl>
            </div>
          </section>
        </aside>

        <section class="main-panel">
          <div class="file-toolbar">
            <div>
              <div id="breadcrumb" class="breadcrumb"></div>
              <p id="pathHint" class="path-hint"></p>
            </div>
            <div class="toolbar-actions">
              <input id="fileFilter" class="file-filter" type="search" placeholder="搜索当前目录">
              <input id="fileInput" type="file" multiple hidden>
              <button id="uploadBtn" type="button">上传</button>
              <button id="mkdirBtn" type="button">新建</button>
              <button id="refreshFilesBtn" type="button">刷新</button>
            </div>
          </div>

          <div id="message" class="message" hidden></div>

          <div class="table-shell">
            <table class="file-table">
              <thead>
                <tr>
                  <th><button class="sort-button" type="button" data-sort="name">名称 <span data-sort-indicator="name"></span></button></th>
                  <th><button class="sort-button" type="button" data-sort="size">大小 <span data-sort-indicator="size"></span></button></th>
                  <th><button class="sort-button" type="button" data-sort="time">修改时间 <span data-sort-indicator="time"></span></button></th>
                  <th><button class="sort-button" type="button" data-sort="type">类型 <span data-sort-indicator="type"></span></button></th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="fileRows"></tbody>
            </table>
            <div id="emptyState" class="empty-state" hidden>这个目录是空的</div>
          </div>

          <section class="tasks-panel">
            <div class="panel-title">
              <h2>下载队列</h2>
              <button id="refreshTasksBtn" class="icon-button" type="button" title="刷新任务">↻</button>
            </div>
            <div id="taskRows" class="task-list"></div>
          </section>
        </section>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
