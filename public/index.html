<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>局域网文件面板</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main id="loginView" class="login-shell">
      <section class="login-panel">
        <div>
          <p class="eyebrow">LAN Transfer Panel</p>
          <h1>局域网文件面板</h1>
        </div>
        <form id="loginForm" class="login-form">
          <label>
            <span>用户名</span>
            <input id="loginUser" name="username" autocomplete="username" value="rclone">
          </label>
          <label>
            <span>密码</span>
            <input id="loginPass" name="password" type="password" autocomplete="current-password">
          </label>
          <button type="submit">登录</button>
          <p id="loginError" class="form-error" hidden></p>
        </form>
      </section>
    </main>

    <main id="appView" class="app-shell" hidden>
      <header class="topbar">
        <div>
          <p class="eyebrow">rclone + aria2</p>
          <h1>局域网文件面板</h1>
        </div>
        <div class="topbar-actions">
          <span id="statusBadge" class="badge">连接中</span>
          <button id="refreshAllBtn" class="ghost-button" type="button">刷新</button>
          <button id="logoutBtn" class="ghost-button" type="button">退出</button>
        </div>
      </header>

      <section class="workspace">
        <aside class="sidebar">
          <section class="panel">
            <div class="panel-title">
              <h2>位置</h2>
              <button id="reloadRemotesBtn" class="icon-button" type="button" title="刷新位置">↻</button>
            </div>
            <nav id="remoteList" class="remote-list"></nav>
          </section>

          <section class="panel">
            <div class="panel-title">
              <h2>添加下载</h2>
            </div>
            <form id="downloadForm" class="download-form">
              <textarea id="downloadUrl" rows="4" placeholder="粘贴 http、https、ftp 或 magnet 链接"></textarea>
              <button type="submit">交给 aria2</button>
            </form>
          </section>

          <section class="panel">
            <div class="panel-title">
              <h2>发送策略</h2>
            </div>
            <form id="sendSettingsForm" class="send-settings">
              <label>
                <span>大文件阈值 GB</span>
                <input id="sendThresholdGb" type="number" min="0.01" step="0.01" value="1">
              </label>
              <label>
                <span>本机对外地址</span>
                <input id="sendPublicHost" value="10.42.0.1">
              </label>
              <label>
                <span>对端 aria2 RPC</span>
                <input id="peerAria2Url" placeholder="http://10.42.0.2:6800/jsonrpc">
              </label>
              <label>
                <span>对端 aria2 secret</span>
                <input id="peerAria2Secret" type="password" placeholder="rpc-secret">
              </label>
              <label>
                <span>对端下载目录</span>
                <input id="peerDir" placeholder="/path/to/downloads">
              </label>
              <label>
                <span>小文件方式</span>
                <select id="smallMethod">
                  <option value="none">手动处理</option>
                  <option value="rclone">rclone copy</option>
                  <option value="rsync">rsync</option>
                </select>
              </label>
              <label>
                <span>rclone 目标目录</span>
                <input id="rcloneTarget" placeholder="peer:/target/dir">
              </label>
              <label>
                <span>rsync 目标</span>
                <input id="rsyncTarget" placeholder="user@10.42.0.2:/target/dir/">
              </label>
              <button type="submit" class="secondary-button">保存策略</button>
            </form>
          </section>

          <section class="panel">
            <div class="panel-title">
              <h2>传输状态</h2>
            </div>
            <dl class="metrics">
              <div><dt>rclone 速度</dt><dd id="rcloneSpeed">0 B/s</dd></div>
              <div><dt>aria2 下载</dt><dd id="aria2Speed">0 B/s</dd></div>
              <div><dt>活动任务</dt><dd id="activeCount">0</dd></div>
            </dl>
          </section>
        </aside>

        <section class="main-panel">
          <div class="file-toolbar">
            <div>
              <div id="breadcrumb" class="breadcrumb"></div>
              <p id="pathHint" class="path-hint"></p>
            </div>
            <div class="toolbar-actions">
              <input id="fileInput" type="file" multiple hidden>
              <button id="uploadBtn" type="button">上传</button>
              <button id="mkdirBtn" type="button">新建文件夹</button>
              <button id="refreshFilesBtn" type="button">刷新</button>
            </div>
          </div>

          <div id="message" class="message" hidden></div>

          <div class="table-shell">
            <table class="file-table">
              <thead>
                <tr>
                  <th>名称</th>
                  <th>大小</th>
                  <th>修改时间</th>
                  <th>类型</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="fileRows"></tbody>
            </table>
            <div id="emptyState" class="empty-state" hidden>这个目录是空的</div>
          </div>

          <section class="tasks-panel">
            <div class="panel-title">
              <h2>aria2 任务</h2>
              <button id="refreshTasksBtn" class="icon-button" type="button" title="刷新任务">↻</button>
            </div>
            <div id="taskRows" class="task-list"></div>
          </section>
        </section>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
